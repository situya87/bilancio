name: Benchmark Health

"on":
  push:
    branches:
      - main
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-antipatterns:
    name: Test Anti-Pattern Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run anti-pattern check
        run: python scripts/check_test_antipatterns.py

  regression-tests:
    name: Regression Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run regression tests
        run: |
          PYTHONPATH=src python -m pytest tests/ -m regression -v --no-cov

  abm-modeling-benchmark:
    name: ABM Modeling Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run ABM benchmark (blocking)
        run: |
          PYTHONPATH=src python scripts/run_abm_modeling_benchmark.py --target-score 90

      - name: Upload ABM benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: abm-modeling-benchmark-report
          path: |
            temp/abm_modeling_benchmark_report.json
            temp/abm_modeling_benchmark_report.md
          if-no-files-found: warn

  simulation-efficiency-benchmark:
    name: Simulation Efficiency Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run simulation efficiency benchmark (blocking)
        run: |
          PYTHONPATH=src python scripts/run_simulation_efficiency_benchmark.py --target-score 85

      - name: Upload simulation efficiency reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-efficiency-benchmark-report
          path: |
            temp/simulation_efficiency_benchmark_report.json
            temp/simulation_efficiency_benchmark_report.md
          if-no-files-found: warn
