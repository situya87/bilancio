name: Extended Benchmarks

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extended-benchmark:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Metamorphic Behavior Benchmark
            script: scripts/run_metamorphic_behavior_benchmark.py
            report_json: temp/metamorphic_behavior_benchmark_report.json
            report_md: temp/metamorphic_behavior_benchmark_report.md
          - name: Long-Horizon Drift Benchmark
            script: scripts/run_long_horizon_drift_benchmark.py
            report_json: temp/long_horizon_drift_benchmark_report.json
            report_md: temp/long_horizon_drift_benchmark_report.md
          - name: Stochastic Robustness Benchmark
            script: scripts/run_stochastic_robustness_benchmark.py
            report_json: temp/stochastic_robustness_benchmark_report.json
            report_md: temp/stochastic_robustness_benchmark_report.md
          - name: Scientific Comparison Benchmark
            script: scripts/run_scientific_comparison_benchmark.py
            report_json: temp/scientific_comparison_benchmark_report.json
            report_md: temp/scientific_comparison_benchmark_report.md
          - name: Calibration - Stylized-Facts Benchmark
            script: scripts/run_stylized_facts_benchmark.py
            report_json: temp/stylized_facts_benchmark_report.json
            report_md: temp/stylized_facts_benchmark_report.md
          - name: Scenario Plugin Contract Benchmark
            script: scripts/run_plugin_contract_benchmark.py
            report_json: temp/plugin_contract_benchmark_report.json
            report_md: temp/plugin_contract_benchmark_report.md
          - name: Compile-to-Apply Equivalence Benchmark
            script: scripts/run_compile_apply_equivalence_benchmark.py
            report_json: temp/compile_apply_equivalence_benchmark_report.json
            report_md: temp/compile_apply_equivalence_benchmark_report.md
          - name: Local-vs-Cloud Parity Benchmark
            script: scripts/run_local_cloud_parity_benchmark.py
            report_json: temp/local_cloud_parity_benchmark_report.json
            report_md: temp/local_cloud_parity_benchmark_report.md
          - name: Failure-Injection Integration Benchmark
            script: scripts/run_failure_injection_integration_benchmark.py
            report_json: temp/failure_injection_integration_benchmark_report.json
            report_md: temp/failure_injection_integration_benchmark_report.md
          - name: Regression Benchmark
            script: scripts/run_regression_benchmark.py
            report_json: temp/regression_benchmark_report.json
            report_md: temp/regression_benchmark_report.md
          - name: Failure-Mode Benchmark
            script: scripts/run_failure_mode_benchmark.py
            report_json: temp/failure_mode_benchmark_report.json
            report_md: temp/failure_mode_benchmark_report.md

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run benchmark
        run: |
          PYTHONPATH=src python ${{ matrix.script }}

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-report
          path: |
            ${{ matrix.report_json }}
            ${{ matrix.report_md }}
          if-no-files-found: warn
