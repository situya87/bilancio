name: PR Benchmark Compatibility

"on":
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  abm-modeling-benchmark:
    name: ABM Modeling Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run ABM compatibility smoke benchmark
        run: |
          PYTHONPATH=src python scripts/run_alt_abm_modeling_benchmark.py \
            --target-score 70 \
            --out-json temp/abm_modeling_benchmark_report.json \
            --out-md temp/abm_modeling_benchmark_report.md

      - name: Upload ABM benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: abm-modeling-benchmark-report-pr
          path: |
            temp/abm_modeling_benchmark_report.json
            temp/abm_modeling_benchmark_report.md
          if-no-files-found: warn

  simulation-efficiency-benchmark:
    name: Simulation Efficiency Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run simulation efficiency compatibility smoke benchmark
        run: |
          PYTHONPATH=src python scripts/run_alt_simulation_efficiency_benchmark.py \
            --target-score 70 \
            --out-json temp/simulation_efficiency_benchmark_report.json \
            --out-md temp/simulation_efficiency_benchmark_report.md

      - name: Upload simulation efficiency reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-efficiency-benchmark-report-pr
          path: |
            temp/simulation_efficiency_benchmark_report.json
            temp/simulation_efficiency_benchmark_report.md
          if-no-files-found: warn
